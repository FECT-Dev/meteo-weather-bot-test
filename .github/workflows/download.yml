name: Daily Weather PDF Download

on:
  schedule:
    - cron: '30 9 * * *'   # 09:30 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-weather:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Set Git identity
        run: |
          git config --global user.name "Auto Commit Bot"
          git config --global user.email "actions@github.com"

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install Google Chrome
      - name: 🌐 Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb

      # Install Python dependencies
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium chromedriver-autoinstaller

      - name: 📄 Run Selenium download script
        run: python download_weather_pdf.py

      - name: 📁 Move PDF to reports folder
        run: |
          TODAY=$(date +%Y-%m-%d)
          mkdir -p reports/$TODAY
          if ls downloads/$TODAY/*.pdf 1> /dev/null 2>&1; then
            mv downloads/$TODAY/*.pdf reports/$TODAY/weather-$TODAY.pdf
            echo "✅ Moved PDF"
          else
            echo "⚠️ No PDF found"
          fi

      - name: 📤 Commit & Push
        run: |
          git add reports/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Add weather report for $(date +%Y-%m-%d)"
            git push
          fi
